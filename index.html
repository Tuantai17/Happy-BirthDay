<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Món Quà Đặc Biệt Cho Bạn 🎁</title>
    <meta name="language" content="vi">
    <meta name="description" content="Một món quà đầy yêu thương đang chờ bạn khám phá! Nhấn để xem lời chúc đặc biệt!">

    <!-- Favicon and Icons -->
    <link rel="icon" href="./image/logo.png" type="image/png">
    <link rel="apple-touch-icon" href="./image/logo.png">

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Món Quà Đặc Biệt Cho Bạn 🎁">
    <meta property="og:description"
        content="Một món quà đầy yêu thương đang chờ bạn khám phá! Nhấn để xem lời chúc đặc biệt!">
    <meta property="og:image" content="./image/logo.png">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="./css/index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css?family=Pacifico&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <button id="langSwitchBtn"
        style="position:fixed;top:20px;right:150px;z-index:10000004;padding:8px 16px;border-radius:8px;background:#fff;color:#222;border:1px solid #dadce0;cursor:pointer;display:none;">
        EN/VI
    </button>
    <canvas id="matrix-rain" style="display: none;"></canvas>
    <canvas style="position:absolute;width:100%;height:100%;z-index:9999;display:none;" class="canvas"></canvas>
    <div class="overlay">
        <div class="stars-container" id="starsContainer"></div>
        <img id="gift-image" src="./gif/happy3.gif"
            style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10000; max-width: 80%; max-height: 80%;" />
        <div class="content-display" id="contentDisplay">
            <p id="contentText"></p>
        </div>
        <div class="firework-container" id="fireworkContainer"></div>
        <div class="book-container">
            <div class="book" id="book"></div>
        </div>

        <button class="music-control" id="musicControl" title="Play/Pause Music">
            ▶
        </button>

        <button class="settings-button" id="settingsButton" title="Settings" style="display:none;">
            ⚙
        </button>

        <!-- Settings hint element -->
        <div id="settingsHint" class="settings-hint" style="display:none;">
            <div class="hint-text" data-i18n="settingsHint">ấn vào đây để setting theo ý muốn</div>
        </div>

        <div id="settingsModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 data-i18n="settings">⚙️ Cài Đặt Trang Web</h2>
                    <span class="close">×</span>
                </div>
                <div class="modal-body">
                    <div class="settings-section">
                        <h3 data-i18n="music">🎵 Cài Đặt Âm Thanh</h3>
                        <div id="musicSystemBlock" class="music-mode-block">
                            <div class="form-group">
                                <label for="backgroundMusic" data-i18n="backgroundMusic">Nhạc Nền:</label>
                                <div class="music-select-row">
                                    <select id="backgroundMusic">
                                        <option value="./music/happy-birthday.mp3" selected>Happy Birthday (Mặc định)</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="settings-section">
                        <h3 data-i18n="countdown">⏰ Cài Đặt Thời Gian</h3>
                        <div class="form-group">
                            <label for="countdownTime" data-i18n="countdownTime">Thời Gian Đếm Ngược:</label>
                            <select id="countdownTime">
                                <option value="3" selected>3 giây</option>
                                <option value="5">5 giây</option>
                                <option value="10">10 giây</option>
                            </select>
                        </div>
                    </div>

                    <div class="settings-section">
                        <h3 data-i18n="matrix">🌧️ Cài Đặt Hiệu Ứng Mưa Chữ</h3>
                        <div class="form-group">
                            <label for="matrixText" data-i18n="matrixText">chữ chính mưa chữ:</label>
                            <input type="text" id="matrixText" value="HAPPYBIRTHDAY">
                        </div>
                        <div class="form-group">
                            <label data-i18n="colorTheme">Chọn màu:</label>
                            <div class="color-theme-buttons">
                                <button type="button" class="color-theme-btn active" data-theme="pink">
                                    <div class="color-preview pink-preview"></div>
                                    <span data-i18n="pinkTheme">Hồng ngọt ngào</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="settings-section">
                        <h3 data-i18n="sequence">✨ Cài Đặt chữ chính</h3>
                        <div class="form-group">
                            <label for="sequenceText" data-i18n="sequenceText">Nội Dung chữ chính:</label>
                            <input type="text" id="sequenceText" value="HAPPY|BIRTHDAY|TO|YOU|❤">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <audio id="birthdayAudio" loop autoplay>
            <source src="./music/happy-birthday.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>

        <div class="copyright" data-i18n="copyright" style="display: none;">
            Website được tạo bởi tiktok: <a
                href="https://www.tiktok.com/@iamtritoan?is_from_webapp=1&sender_device=pc">iamtritoan</a>
        </div>

        <div id="orientation-lock">
            <div class="phone-icon">
                <img src="./image/screen.png" alt="">
            </div>
        </div>

        <!-- Nút Full màn hình, chỉ hiện trên Android -->
        <button id="fullscreenBtn" style="
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 990010;
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            background: #222;
            color: #fff;
            font-size: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            cursor: pointer;
            display: none;
        ">
            <img style="
                width: 20px;
                height: 20px;
                vertical-align: middle;
            " src="./image/full.png" alt="">
        </button>

        <script src="./lang.js"></script>
        <script src="./jscp/settings.js?v=2"></script>
        <script src="./jscp/main.js"></script>
        <script src="./jscp/ui.js?v=6"></script>
</body>

</html>
